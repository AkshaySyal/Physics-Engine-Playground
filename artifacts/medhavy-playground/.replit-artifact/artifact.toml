kind = "web"
previewPath = "/"
title = "Medhavy Physics Visualization Playground"
version = "1.0.0"
id = "artifacts/medhavy-playground"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25614

[services.development]
run = "pnpm --filter @workspace/medhavy-playground run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medhavy-playground", "run", "build" ]
publicDir = "artifacts/medhavy-playground/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25614"
BASE_PATH = "/"
